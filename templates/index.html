<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Car Price Predictor</title>
      <link rel="stylesheet" href="static/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-dark">
    <div class="container mt-50">
      <div class="row">
        <div class="card mt-50 text-center" style="width: 100%; height: 100%">
          <div class="card-header">
            <div class="col-12">
              <h1 class="">Welcome to Keval's Car price Predictor</h1>
            </div>
          </div>
          <div class="card-body center">
            <form class="p" method="post" accept-charset="utf-8">

              <div class="col-12 form-group my-3" style="text-align: center">
                <label><b>Select Company: </b></label>
                <select class="selectpicker form-control" id="company" name="company" required="1" onchange="load_car_model(this.id, 'car_model')">

                  {% for company in companies %}
                  <option value="{{company}}">{{company}}</option>
                  {% endfor %}
                </select>
              </div>

              <div class="col-12 form-group my-3" style="text-align: center">
                <label><b>Select Model: </b></label>
                <select class="selectpicker form-control" id="car_model" name="car_model" required="1">
                  <option value=" "></option>
                </select>
              </div>
              <div class="col-12 form-group my-3" style="text-align: center">
                <label><b>Select Year of Purchase: </b></label>
                <select class="selectpicker form-control" id="year" name="year" required="1">
                  {% for year in years %}
                  <option value="{{year}}">{{year}}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-12 form-group my-3" style="text-align: center">
                <label><b>Select Fuel Type: </b></label>
                <select class="selectpicker form-control" id="fuel_type" name="fuel_type" required="1">
                  {% for fuels in fuel_type %}
                  <option value="{{fuels}}">{{fuels}}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="col-12 form-group my-3" style="text-align: center">
                <label><b>Enter Number of Km Driven </b></label>
                <input class="form-control" type="text" id="kms_driven" name="kms_driven" placeholder="Enter no. of Kilometers travelled"/>
              </div>

              <button class="btn btn-primary form-control my-3" onclick="send_data()">Predict Price</button>
            </form>
          </div>
          <div class="row">
            <div class="col-12 text-center">
              <h3><span id="prediction"></span></h3>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
    // 1. Data ko JS Object mein badlein (Ek hi baar server se aayega)
    const allModels = {
        {% for comp in companies %}
            "{{ comp }}": [
                {% for model in car_model %}
                    {% if comp in model %}"{{ model }}",{% endif %}
                {% endfor %}
            ],
        {% endfor %}
    };

    function load_car_model(company_id, car_model_id) {
        var companySelect = document.getElementById(company_id);
        var modelSelect = document.getElementById(car_model_id);

        var selectedValue = companySelect.value;

        // Purane options saaf karein
        modelSelect.innerHTML = '<option value="">Select Model</option>';

        // 2. JS se filter karke naye options jodein
        if (allModels[selectedValue]) {
            allModels[selectedValue].forEach(function(model) {
                var newOption = document.createElement("option");
                newOption.value = model;
                newOption.innerHTML = model;
                modelSelect.add(newOption);
            });
              }
          }

        function form_handler(event){
          event.preventDefault();
        }

        function send_data(){
          document.querySelector('form').addEventListener('submit', form_handler);

          var fd = new FormData(document.querySelector('form'))

          var xhr = new XMLHttpRequest()
          xhr.open('POST', '/predict', true)
          document.getElementById("prediction").innerHTML = "Wait! Predicting Price..."

          xhr.onreadystatechange = function (){
            if (xhr.readyState == XMLHttpRequest.DONE){
              document.getElementById("prediction").innerHTML = "Prediction: ₹" + xhr.responseText;
            }
          }

          xhr.onload = function(){
            
          };
          xhr.send(fd);
        }

      </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
